<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Application pour gérer les tâches, le calendrier et les listes de courses de la famille">
  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="./image/icon-192.png">
  <link rel="icon" href="./image/icon-192.png" type="image/png">
  <link rel="stylesheet" href="./styles.css">
  <title>Family Prime</title>
</head>
<body>

  <!-- Screen Authentication Overlay -->
  <div id="loginScreen">
    <div class="login-card">
      <h1>Connexion</h1>
      <p>Entrez le mot de passe pour accéder à votre espace Famille</p>
      <input id="password" type="password" placeholder="Mot de passe">
      <button id="loginBtn" class="btn-primary">Se connecter</button>
      <p id="error">Mot de passe incorrect</p>
    </div>
  </div>

  <!-- Main Mobile App Wrapper -->
  <div class="phone-container" id="appContainer">
    
    <!-- 1. CALENDRIER TAB -->
    <div id="tab-calendrier" class="screen">
      <div class="app-header">
        <div>
          <h2>Calendrier</h2>
          <div class="subtitle">Planifier les événements</div>
        </div>
        <div class="emoji-icon">📅</div>
      </div>

      <div class="card">
        <div class="input-group input-group-column">
          <label for="calendarDateInput">Date</label>
          <input type="date" id="calendarDateInput" title="Sélectionnez une date">
          <label for="calendarEventInput">Événement</label>
          <input type="text" id="calendarEventInput" placeholder="Nom de l'événement..." title="Entrez le nom de l'événement">
          <button class="btn-primary" onclick="addCalendarEvent()">Enregistrer la date</button>
        </div>
      </div>

      <div class="card">
        <div class="card-title">Événements enregistrés</div>
        <ul id="calendarEventsList"></ul>
      </div>
    </div>

    <!-- 2. LISTE DE COURSES TAB (Original App exact functionality & structure) -->
    <div id="tab-courses" class="screen active">
      <div class="app-header">
        <div>
          <h2>Liste de Courses</h2>
          <div class="subtitle">Shop-n-Go</div>
        </div>
        <div class="options-container">
          <button class="options-button" onclick="toggleOptionsMenu()">⚙️</button>
          <div class="options-menu" id="optionsMenu">
            <button onclick="openStoreSettings()">🏪 Gérer magasins</button>
            <button onclick="downloadList()">Télécharger en .txt</button>
            <button onclick="printList()">Imprimer</button>
            <button onclick="shareList()">Partager</button>
            <button onclick="clearList()">Supprimer la liste</button>
            <input type="file" id="fileInput" onchange="loadFile(event)" title="Charger un fichier txt">
            <button onclick="document.getElementById('fileInput').click()">Charger un fichier .txt</button>
          </div>
        </div>
      </div>

      <!-- Store selector -->
      <div class="store-selector">
        <select id="storeSelector" onchange="changeStore()" title="Sélectionnez un magasin">
          <option value="">-- Choisir un magasin --</option>
        </select>
      </div>

      <!-- Action buttons -->
      <div id="actionButtonsContainer">
        <button class="btn-action" id="sortBtn" onclick="sortListWithAI()" title="Trier avec IA">🤖 Trier</button>
        <button class="btn-action" id="editBtn" onclick="toggleEditMode()" title="Mode édition">✏️ Éditer</button>
        <button class="btn-action btn-success" id="confirmEditBtn" onclick="confirmEditMode()" title="Confirmer" hidden>✓ Fait</button>
      </div>

      <div class="input-group">
        <input type="text" id="item" placeholder="Nom de l'article">
        <button class="btn-primary add-button" onclick="addItem()">Ajouter</button>
      </div>

      <ul id="list"></ul>
    </div>

    <!-- BOTTOM NAVBAR -->
    <div class="navbar">
      <div class="nav-item active" onclick="switchTab('courses')">
        <svg viewBox="0 0 24 24"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>
        <span>Courses</span>
      </div>
      <div class="nav-item" onclick="switchTab('calendrier')">
        <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
        <span>Calendrier</span>
      </div>
    </div>

    <!-- Store Settings Modal -->
    <div id="storeSettingsModal" class="modal">
      <div class="modal-content">
        <div class="modal-header">
          <h2>Gérer les Magasins</h2>
          <button class="close-btn" onclick="closeStoreSettings()">&times;</button>
        </div>
        <div class="modal-body">
          <div id="storeList"></div>
          <button class="btn-primary" id="addStoreBtn" onclick="openAddStoreDialog()">+ Ajouter un magasin</button>
        </div>
      </div>
    </div>

    <!-- Add/Edit Store Modal -->
    <div id="storeDialogModal" class="modal">
      <div class="modal-content">
        <div class="modal-header">
          <h2 id="storeDialogTitle">Ajouter un magasin</h2>
          <button class="close-btn" onclick="closeStoreDialog()">&times;</button>
        </div>
        <div class="modal-body">
          <div class="modal-input-group">
            <label>Nom du magasin</label>
            <input type="text" id="storeNameInput" placeholder="ex: Carrefour">
          </div>
          <div class="modal-input-group">
            <label>Rayons séparés par des virgules</label>
            <textarea id="aislesInput" placeholder="ex: Fruits & Légumes, Laiterie, Viande, Boulangerie"></textarea>
          </div>
          <div class="modal-button-group">
            <button class="btn-primary" onclick="saveStore()">Enregistrer</button>
            <button class="btn-cancel" onclick="closeStoreDialog()">Annuler</button>
          </div>
        </div>
      </div>
    </div>

  </div>

  <!-- FIREBASE ENGINE & APPLICATION LOGIC -->
  <script type="module" src="./app.js"></script>

  <!-- Service Worker registration for PWA features -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./service-worker.js')
        .then(() => console.log('Service Worker enregistré.'))
        .catch(err => console.log('Erreur Service Worker:', err));
    }
  </script>
</body>
</html>
